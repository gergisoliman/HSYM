    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        darkbg: '#0f172a',
                        darkcard: '#1e293b',
                        darkborder: '#334155',
                        lightbg: '#f1f5f9',
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .hidden-app { display: none !important; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(100%); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-nav {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(51, 65, 85, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .verse-box { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
        .dark .verse-box { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        
        /* Specific Button Colors */
        .btn-whatsapp { background-color: #25D366; color: white; }
        .btn-whatsapp:hover { background-color: #128C7E; }
        .btn-call { background-color: #3b82f6; color: white; }
        .btn-call:hover { background-color: #2563eb; }

                </div>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6 meeting-name-display">اجتماع شباب ثانوى</h2>
            
            <form onsubmit="checkPassword(event)" class="space-y-4">

                    <label class="block text-slate-600 dark:text-slate-400 text-sm font-bold mb-2 mr-1">رمز الدخول:</label>

                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                </button>
            </form>
        </div>

        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginScreen = document.getElementById('loginScreen');
            const mainApp = document.getElementById('mainApp');

            if (input === CONFIG.PASSWORD) {
                loginScreen.style.opacity = '0';
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    mainApp.classList.remove('hidden-app');
                    showHome(); 
                }, 500);
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('passwordInput').classList.add('border-red-500', 'ring-1', 'ring-red-500');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2500);
        }

        function copyToClipboardFallback(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); } catch (err) { console.error('Fallback: Oops, unable to copy', err); }
                textArea.remove();
            }
        }

        function startPress(e) {
            const target = e.target.closest('.copy-action');
            if (!target) return;
            
            window.isLongPress = false;
            pressTimer = setTimeout(() => {
                window.isLongPress = true;
                const num = target.getAttribute('data-copy');
                if (num) {
                    copyToClipboardFallback(num);
                    showToast(num);
                    if (navigator.vibrate) navigator.vibrate(50);
                    
                    target.style.opacity = '0.5';
                    setTimeout(() => target.style.opacity = '1', 200);
                }
            }, 500); // 500 ملي ثانية للضغطة الطويلة
        }

        function cancelPress() {
            clearTimeout(pressTimer);
        }
